<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7B5BA6">
  <title>Offline — Family Planner</title>
  <style>
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      background: #1a1a2e; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center; padding: 2rem;
    }
    .icon  { font-size: 4rem; margin-bottom: 1rem; }
    h1     { font-size: 1.4rem; font-weight: 700; margin: 0 0 .5rem; }
    p      { font-size: .9rem; opacity: .6; margin: 0 0 2rem; }
    button {
      background: #7B5BA6; color: #fff; border: none; border-radius: 10px;
      padding: .85rem 2rem; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">🏠</div>
  <h1>You're offline</h1>
  <p>Check your connection and try again.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
